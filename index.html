    <!-- Polyfill/Patch to prevent Uncaught TypeError on read-only window.fetch inside sandbox iframes -->
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var fetchValue = originalFetch;
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return fetchValue;
              },
              set: function(val) {
                fetchValue = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          try {
            var proto = Object.getPrototypeOf(window) || Window.prototype;
            if (proto && Object.getOwnPropertyDescriptor(proto, 'fetch')) {
              var fetchValueProto = window.fetch;
              Object.defineProperty(proto, 'fetch', {
                get: function() {
                  return fetchValueProto;
                },
                set: function(val) {
                  fetchValueProto = val;
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (err) {
            console.warn('Could not patch window.fetch fallback:', err);
          }
        }
      })();
    </script>
